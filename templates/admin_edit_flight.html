<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Edit Flight - Admin</title>
    <style>
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #1a1a2e; color: white; padding: 20px; position: fixed; height: 100vh; }
        .main-content { flex: 1; margin-left: 260px; padding: 30px; background: #f5f7fa; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin: 5px 0; border-radius: 8px; }
        .sidebar a:hover, .sidebar a.active { background: #2a2a4e; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .form-container { max-width: 500px; margin: 0 auto; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.active { transform: translateX(0); } .main-content { margin-left: 0; } }
        .menu-toggle { display: none; position: fixed; top: 10px; left: 10px; z-index: 1000; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
    </style>
</head>
<body>
    <button class="btn btn-primary menu-toggle" onclick="toggleSidebar()">☰ Menu</button>
    
    <div class="admin-container">
        <div class="sidebar">
            <h3><i class="fas fa-plane-departure"></i> SkyBook Admin</h3>
            <hr>
            <p>Welcome, {{ session.user_name }}</p>
            <hr>
            <a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/admin/flights" class="active"><i class="fas fa-plane"></i> Manage Flights</a>
            <a href="/admin/add_flight"><i class="fas fa-plus-circle"></i> Add Flight</a>
            <a href="/admin/users"><i class="fas fa-users"></i> Manage Users</a>
            <a href="/admin/bookings"><i class="fas fa-ticket-alt"></i> All Bookings</a>
            <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>

        <div class="main-content">
            <div class="card form-container">
                <h2>Edit Flight</h2>
                <form method="POST">
                    <div class="form-group">
                        <label>Airline Name:</label>
                        <input type="text" name="airline_name" value="{{ flight.airline_name }}" required style="width: 100%; padding: 8px; margin: 5px 0;">
                    </div>
                    <div class="form-group">
                        <label>Source (From):</label>
                        <input type="text" name="source" value="{{ flight.source }}" required style="width: 100%; padding: 8px; margin: 5px 0;">
                    </div>
                    <div class="form-group">
                        <label>Destination (To):</label>
                        <input type="text" name="destination" value="{{ flight.destination }}" required style="width: 100%; padding: 8px; margin: 5px 0;">
                    </div>
                    <div class="form-group">
                        <label>Departure Time:</label>
                        <input type="datetime-local" name="departure_time" value="{{ flight.departure_time.strftime('%Y-%m-%dT%H:%M') if flight.departure_time else '' }}" required style="width: 100%; padding: 8px; margin: 5px 0;">
                    </div>
                    <div class="form-group">
                        <label>Arrival Time:</label>
                        <input type="datetime-local" name="arrival_time" value="{{ flight.arrival_time.strftime('%Y-%m-%dT%H:%M') if flight.arrival_time else '' }}" required style="width: 100%; padding: 8px; margin: 5px 0;">
                    </div>
                    <div class="form-group">
                        <label>Total Seats:</label>
                        <input type="number" name="total_seats" value="{{ flight.total_seats }}" required style="width: 100%; padding: 8px; margin: 5px 0;">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Flight</button>
                    <a href="/admin/flights" class="btn">Cancel</a>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
