<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Flights - SkyBook</title>
</head>
<body>

<nav class="navbar">
    <a href="/" class="brand">✈ SkyBook</a>
    <div class="nav-links">
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <p class="section-title">Available Flights</p>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Airline</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Departure</th>
                    <th>Arrival</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for flight in flights %}
                <tr>
                    <td>{{ flight[0] }}</td>
                    <td>{{ flight[1] }}</td>
                    <td>{{ flight[2] }}</td>
                    <td>{{ flight[3] }}</td>
                    <td>{{ flight[4] }}</td>
                    <td>{{ flight[5] }}</td>
                    <td><a href="/book/{{ flight[0] }}">Book</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
