<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Register - SkyBook</title>
</head>
<body>

<nav class="navbar">
    <a href="/" class="brand">✈ SkyBook</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login" class="btn-primary">Login</a>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width: 460px; margin: auto;">
        <p class="form-title">Create your account</p>

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Jane Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="+91 98765 43210" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>

        <p class="form-footer">Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>

</body>
</html>
